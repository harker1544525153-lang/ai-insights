name: 每日更新AI行业资讯

on:
  # 定时任务：每天UTC时间0点执行（北京时间8点）
  schedule:
    - cron: "0 0 * * *"
  # 手动触发选项
  workflow_dispatch:

jobs:
  update-news:
    runs-on: ubuntu-latest
    steps:
      # 检出代码
      - name: 检出仓库
        uses: actions/checkout@v4

      # 设置Python环境
      - name: 设置Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      # 安装依赖
      - name: 安装依赖
        run: |
          python -m pip install --upgrade pip
          # 如果需要安装其他依赖，添加到这里

      # 执行资讯更新脚本
      - name: 更新资讯
        run: |
          # 这里添加执行资讯更新的命令
          # 例如：python update_news.py
          # 或者直接在脚本中生成新的index.html文件

      # 提交更新
      - name: 提交更新
        run: |
          git config --global user.name 'GitHub Actions'
          git config --global user.email 'actions@github.com'
          git add .
          git commit -m '每日更新AI行业资讯' || echo "无更改"
          git push