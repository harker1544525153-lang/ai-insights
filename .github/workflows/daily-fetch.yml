name: AI简讯自动更新与部署

on:
  # 每天北京时间8:00和8:30执行（UTC时间0:00和0:30）
  schedule:
    - cron: '0 0 * * *'  # 每天UTC 0:00（北京时间8:00）
    - cron: '30 0 * * *' # 每天UTC 0:30（北京时间8:30）
  # 允许手动触发
  workflow_dispatch:
  # 当有推送到main分支时也执行
  push:
    branches: [ main ]

jobs:
  update-news:
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout repository
      uses: actions/checkout@v4
      with:
        # 获取完整历史记录，以便比较更改
        fetch-depth: 0

    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '18'
        cache: 'npm'

    - name: Install Python dependencies
      run: |
        python -m pip install --upgrade pip
        pip install pandas openpyxl feedparser requests beautifulsoup4 selenium

    - name: Install Node.js dependencies
      run: |
        npm install axios cheerio

    - name: Generate timestamp
      id: timestamp
      run: |
        echo "timestamp=$(date -u +'%Y-%m-%dT%H:%M:%SZ')" >> $GITHUB_OUTPUT
        echo "date=$(date -u +'%Y-%m-%d')" >> $GITHUB_OUTPUT
        echo "time=$(date -u +'%H:%M')" >> $GITHUB_OUTPUT
        echo "date_human=$(date -u +'%Y年%m月%d日')" >> $GITHUB_OUTPUT

    - name: Run Python data processing
      run: |
        python run.py --auto
      env:
        # 可以在这里添加API密钥等敏感信息
        DEEPGEO_API_KEY: ${{ secrets.DEEPGEO_API_KEY }}
        AIWW_API_KEY: ${{ secrets.AIWW_API_KEY }}
        GARTNER_API_KEY: ${{ secrets.GARTNER_API_KEY }}

    - name: Update HTML timestamp
      run: |
        # 更新result/index.html中的时间戳
        sed -i "s/最近更新：.*/最近更新：${{ steps.timestamp.outputs.date_human }} ${{ steps.timestamp.outputs.time }}/g" result/index.html

    - name: Check for changes
      id: check-changes
      run: |
        git add -A
        if git diff --staged --quiet; then
          echo "changes=false" >> $GITHUB_OUTPUT
          echo "No changes detected"
        else
          echo "changes=true" >> $GITHUB_OUTPUT
          echo "Changes detected, will commit and push"
        fi

    - name: Commit and push if changes exist
      if: steps.check-changes.outputs.changes == 'true'
      run: |
        git config --local user.email "action@github.com"
        git config --local user.name "GitHub Action"
        git commit -m "🤖 AI简讯自动更新 ${{ steps.timestamp.outputs.date }} ${{ steps.timestamp.outputs.time }}
        
        自动更新内容：
        - 执行Python数据处理脚本
        - 生成最新简讯内容
        - 更新HTML文件和Markdown文档
        - 触发GitHub Pages重新部署"
        git push

    - name: Deploy to GitHub Pages
      uses: peaceiris/actions-gh-pages@v3
      if: always()
      with:
        github_token: ${{ secrets.GITHUB_TOKEN }}
        publish_dir: ./result
        publish_branch: gh-pages
        force_orphan: true
        keep_files: false

    - name: Create success notification
      if: success()
      run: |
        echo "✅ AI简讯自动更新任务执行成功！"
        echo "📅 更新时间: ${{ steps.timestamp.outputs.timestamp }}"
        echo "📊 生成文件: result/index.html, result/latest.md"
        echo "🌐 页面地址: https://harker1544525153-lang.github.io/ai-insights/"
        echo "🔗 GitHub Pages部署完成"

    - name: Create failure notification
      if: failure()
      run: |
        echo "❌ AI简讯自动更新任务执行失败！"
        echo "请检查错误日志并重新运行"
        echo "📧 错误详情请查看Actions日志"

  deploy:
    needs: update-news
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main'
    
    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Setup Pages
      uses: actions/configure-pages@v4

    - name: Upload artifact
      uses: actions/upload-pages-artifact@v3
      with:
        path: '.'

    - name: Deploy to GitHub Pages
      id: deployment
      uses: actions/deploy-pages@v4
      
    - name: Deployment success notification
      if: success()
      run: |
        echo "🚀 GitHub Pages部署成功！"
        echo "🌐 访问地址: https://${{ github.repository_owner }}.github.io/${{ github.event.repository.name }}/"
        echo "📅 部署时间: $(date -u +'%Y-%m-%d %H:%M UTC')"