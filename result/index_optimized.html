<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>每日AI行业洞察·十大精选</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: 'Segoe UI', 'Microsoft YaHei', sans-serif;
            background: linear-gradient(135deg, #0f0f23 0%, #1a1a2e 50%, #16213e 100%);
            color: #e0e0e0;
            line-height: 1.6;
            min-height: 100vh;
        }
        
        .container {
            max-width: 1200px;
            margin: 0 auto;
            padding: 20px;
        }
        
        .header {
            text-align: center;
            margin-bottom: 30px;
            position: relative;
        }
        
        .header h1 {
            font-size: 2.5rem;
            background: linear-gradient(45deg, #00d4ff, #0099ff, #0066ff);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            margin-bottom: 10px;
            font-weight: 700;
        }
        
        .header .subtitle {
            color: #888;
            font-size: 1.1rem;
            margin-bottom: 20px;
        }
        
        .control-panel {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 30px;
            padding: 20px;
            background: rgba(255, 255, 255, 0.05);
            border-radius: 15px;
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.1);
        }
        
        .date-section {
            display: flex;
            align-items: center;
            gap: 15px;
            flex: 1;
        }
        
        .date-input {
            padding: 10px 15px;
            border: 1px solid rgba(255, 255, 255, 0.2);
            border-radius: 8px;
            background: rgba(255, 255, 255, 0.1);
            color: #fff;
            font-size: 0.9rem;
            min-width: 150px;
        }
        
        .date-btn {
            padding: 10px 20px;
            border: none;
            border-radius: 8px;
            background: linear-gradient(45deg, #007bff, #0056b3);
            color: white;
            cursor: pointer;
            font-size: 0.9rem;
            transition: all 0.3s ease;
        }
        
        .date-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(0, 123, 255, 0.4);
        }
        
        .today-btn {
            background: linear-gradient(45deg, #28a745, #20c997);
        }
        
        .stats-section {
            display: flex;
            gap: 20px;
            flex-wrap: wrap;
            justify-content: flex-end;
            flex: 1;
        }
        
        .stat-item {
            text-align: center;
            padding: 8px 12px;
            background: rgba(255, 255, 255, 0.08);
            border-radius: 8px;
            border: 1px solid rgba(255, 255, 255, 0.1);
            min-width: 80px;
        }
        
        .stat-number {
            display: block;
            font-size: 1.2rem;
            font-weight: bold;
            color: #00d4ff;
            margin-bottom: 2px;
        }
        
        .stat-label {
            font-size: 0.75rem;
            color: #aaa;
        }
        
        .insights-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(350px, 1fr));
            gap: 20px;
            margin-bottom: 30px;
        }
        
        .insight-card {
            background: rgba(255, 255, 255, 0.05);
            border-radius: 15px;
            padding: 25px;
            border: 1px solid rgba(255, 255, 255, 0.1);
            transition: all 0.3s ease;
            position: relative;
            backdrop-filter: blur(10px);
        }
        
        .insight-card:hover {
            transform: translateY(-5px);
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.3);
            border-color: rgba(0, 212, 255, 0.3);
        }
        
        .insight-header {
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
            margin-bottom: 15px;
        }
        
        .insight-id {
            background: linear-gradient(45deg, #ff6b6b, #ee5a24);
            color: white;
            padding: 5px 12px;
            border-radius: 20px;
            font-size: 0.8rem;
            font-weight: bold;
        }
        
        .insight-category {
            background: rgba(0, 212, 255, 0.2);
            color: #00d4ff;
            padding: 4px 10px;
            border-radius: 12px;
            font-size: 0.75rem;
        }
        
        .insight-title {
            font-size: 1.2rem;
            font-weight: 600;
            margin-bottom: 10px;
            line-height: 1.4;
            color: #fff;
        }
        
        .insight-content {
            margin-bottom: 15px;
        }
        
        .insight-summary {
            color: #ccc;
            margin-bottom: 10px;
            line-height: 1.5;
        }
        
        .insight-comment {
            color: #00d4ff;
            font-style: italic;
            padding: 10px;
            background: rgba(0, 212, 255, 0.1);
            border-radius: 8px;
            border-left: 3px solid #00d4ff;
        }
        
        .insight-meta {
            display: flex;
            justify-content: space-between;
            align-items: center;
            font-size: 0.8rem;
            color: #888;
            margin-top: 15px;
            padding-top: 15px;
            border-top: 1px solid rgba(255, 255, 255, 0.1);
        }
        
        .insight-source {
            color: #20c997;
        }
        
        .insight-time {
            color: #aaa;
        }
        
        .insight-actions {
            display: flex;
            gap: 10px;
            margin-top: 15px;
        }
        
        .action-btn {
            padding: 6px 12px;
            border: none;
            border-radius: 6px;
            font-size: 0.8rem;
            cursor: pointer;
            transition: all 0.3s ease;
        }
        
        .read-btn {
            background: linear-gradient(45deg, #007bff, #0056b3);
            color: white;
            text-decoration: none;
            display: inline-block;
        }
        
        .share-btn {
            background: rgba(255, 255, 255, 0.1);
            color: #ccc;
            border: 1px solid rgba(255, 255, 255, 0.2);
        }
        
        .share-btn:hover {
            background: rgba(255, 255, 255, 0.2);
        }
        
        .footer {
            text-align: center;
            margin-top: 40px;
            padding: 20px;
            color: #666;
            font-size: 0.9rem;
            border-top: 1px solid rgba(255, 255, 255, 0.1);
        }
        
        .loading {
            text-align: center;
            padding: 40px;
            color: #888;
        }
        
        .no-data {
            text-align: center;
            padding: 60px 20px;
            color: #666;
        }
        
        @media (max-width: 768px) {
            .control-panel {
                flex-direction: column;
                gap: 20px;
            }
            
            .date-section {
                justify-content: center;
                flex-wrap: wrap;
            }
            
            .stats-section {
                justify-content: center;
            }
            
            .insights-grid {
                grid-template-columns: 1fr;
            }
            
            .header h1 {
                font-size: 2rem;
            }
        }
        
        @media (max-width: 480px) {
            .container {
                padding: 10px;
            }
            
            .stat-item {
                min-width: 60px;
                padding: 6px 8px;
            }
            
            .stat-number {
                font-size: 1rem;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>每日AI行业洞察·十大精选</h1>
            <div class="subtitle">汇聚AI领域最新动态，洞察技术发展趋势</div>
            <button onclick="refreshData()" class="date-btn" style="margin-top: 10px;">🔄 获取最新资讯</button>
        </div>
        
        <div class="control-panel">
            <div class="date-section">
                <input type="date" id="dateInput" class="date-input" value="2026-03-07">
                <button onclick="loadDateData()" class="date-btn">📅 查看该日简讯</button>
                <button onclick="loadTodayData()" class="date-btn today-btn">📊 今日简讯</button>
                <span style="font-size: 0.8em; color: #666;">选择日期查看历史简讯</span>
            </div>
            
            <div class="stats-section">
                <div class="stat-item">
                    <span class="stat-number" id="statSources">4</span>
                    <span class="stat-label">处理源</span>
                </div>
                <div class="stat-item">
                    <span class="stat-number" id="statArticles">6</span>
                    <span class="stat-label">获取文章</span>
                </div>
                <div class="stat-item">
                    <span class="stat-number" id="statFiltered">4</span>
                    <span class="stat-label">筛选后</span>
                </div>
                <div class="stat-item">
                    <span class="stat-number" id="statFinal">2</span>
                    <span class="stat-label">最终文章</span>
                </div>
                <div class="stat-item">
                    <span class="stat-number" id="statDuration">5m</span>
                    <span class="stat-label">运行时长</span>
                </div>
            </div>
        </div>
        
        <div id="insightsContainer">
            <div class="loading">
                <p>正在加载AI简讯数据...</p>
            </div>
        </div>
        
        <div class="footer">
            <p>最近更新：<span id="lastUpdate">2026-03-07 10:40:45</span></p>
            <p>数据来源：AWS blog、阿里云、NVIDIA blog、TechCrunch、36氪等专业平台</p>
        </div>
    </div>

    <script>
        // 当前日期
        const currentDate = '2026-03-07';
        
        // 模拟数据
        const sampleInsights = [
            {
                id: 1,
                title: 'AWS宣布Amazon Bedrock新增多项AI推理功能',
                category: '云计算',
                priority: 9,
                summary: 'AWS宣布Amazon Bedrock新增多项功能，包括增强的推理能力和更灵活的模型配置选项，为企业提供更强大的AI服务能力。',
                comment: '从云厂商视角看，AWS持续强化AI基础设施，这将进一步巩固其在云计算AI服务领域的领先地位。',
                source: 'AWS blog',
                link: 'https://aws.amazon.com/blogs/aws/new-amazon-bedrock-features/',
                published: '2026-03-07 09:30'
            },
            {
                id: 2,
                title: 'NVIDIA发布新一代AI芯片，性能提升显著',
                category: '算力',
                priority: 10,
                summary: 'NVIDIA最新发布的AI芯片在计算性能和能效方面都有显著提升，为大规模AI训练提供更强支持。',
                comment: '作为AI硬件领导者，NVIDIA的技术迭代将推动整个AI行业的发展速度，云厂商需要及时跟进硬件升级。',
                source: 'NVIDIA blog',
                link: 'https://blogs.nvidia.com/new-ai-chip/',
                published: '2026-03-07 08:15'
            }
        ];
        
        // 页面加载时初始化
        document.addEventListener('DOMContentLoaded', function() {
            loadTodayData();
            
            // 设置自动刷新（每5分钟）
            setInterval(refreshData, 5 * 60 * 1000);
            
            // 页面可见性变化时刷新
            document.addEventListener('visibilitychange', function() {
                if (!document.hidden) {
                    refreshData();
                }
            });
        });
        
        // 加载今日数据
        function loadTodayData() {
            document.getElementById('dateInput').value = currentDate;
            displayInsights(sampleInsights);
            updateStats({
                sources: 4,
                articles: 6,
                filtered: 4,
                final: 2,
                duration: '5m'
            });
        }
        
        // 加载指定日期数据
        function loadDateData() {
            const selectedDate = document.getElementById('dateInput').value;
            if (!selectedDate) {
                alert('请选择日期');
                return;
            }
            
            // 模拟加载历史数据
            const container = document.getElementById('insightsContainer');
            container.innerHTML = '<div class="loading"><p>正在加载 ' + selectedDate + ' 的历史简讯...</p></div>';
            
            setTimeout(() => {
                if (selectedDate === currentDate) {
                    displayInsights(sampleInsights);
                } else {
                    container.innerHTML = '<div class="no-data"><p>暂无 ' + selectedDate + ' 的简讯数据</p></div>';
                }
            }, 1000);
        }
        
        // 刷新数据
        function refreshData() {
            const container = document.getElementById('insightsContainer');
            container.innerHTML = '<div class="loading"><p>正在获取最新资讯...</p></div>';
            
            // 模拟网络请求
            setTimeout(() => {
                displayInsights(sampleInsights);
                updateLastUpdate();
                
                // 显示刷新成功提示
                showNotification('数据已更新', 'success');
            }, 2000);
        }
        
        // 显示洞察数据
        function displayInsights(insights) {
            const container = document.getElementById('insightsContainer');
            
            if (!insights || insights.length === 0) {
                container.innerHTML = '<div class="no-data"><p>暂无简讯数据</p></div>';
                return;
            }
            
            let html = '<div class="insights-grid">';
            
            insights.forEach(insight => {
                html += `
                    <div class="insight-card">
                        <div class="insight-header">
                            <span class="insight-id">${insight.id}</span>
                            <span class="insight-category">${insight.category}</span>
                        </div>
                        <h3 class="insight-title">${insight.title}</h3>
                        <div class="insight-content">
                            <p class="insight-summary"><strong>摘要：</strong>${insight.summary}</p>
                            <p class="insight-comment"><strong>点评：</strong>${insight.comment}</p>
                        </div>
                        <div class="insight-meta">
                            <span class="insight-source">来源：${insight.source}</span>
                            <span class="insight-time">${insight.published}</span>
                        </div>
                        <div class="insight-actions">
                            <a href="${insight.link}" target="_blank" class="action-btn read-btn">阅读原文</a>
                            <button class="action-btn share-btn" onclick="shareInsight(${insight.id})">分享</button>
                        </div>
                    </div>
                `;
            });
            
            html += '</div>';
            container.innerHTML = html;
        }
        
        // 更新统计信息
        function updateStats(stats) {
            document.getElementById('statSources').textContent = stats.sources;
            document.getElementById('statArticles').textContent = stats.articles;
            document.getElementById('statFiltered').textContent = stats.filtered;
            document.getElementById('statFinal').textContent = stats.final;
            document.getElementById('statDuration').textContent = stats.duration;
        }
        
        // 更新最后更新时间
        function updateLastUpdate() {
            const now = new Date();
            const formatted = now.toLocaleString('zh-CN');
            document.getElementById('lastUpdate').textContent = formatted;
        }
        
        // 分享简讯
        function shareInsight(insightId) {
            const insight = sampleInsights.find(i => i.id === insightId);
            if (!insight) return;
            
            const shareText = `AI简讯【${currentDate}】\n\n${insight.id}、【${insight.title}】\n摘要：${insight.summary}\n点评：${insight.comment}\n原文链接：${insight.link}\n\n详见原文网址：https://harker1544525153-lang.github.io/ai-insights/`;
            
            if (navigator.share) {
                navigator.share({
                    title: `AI简讯 ${currentDate}`,
                    text: shareText,
                    url: window.location.href
                });
            } else {
                // 复制到剪贴板
                navigator.clipboard.writeText(shareText).then(() => {
                    showNotification('简讯内容已复制到剪贴板', 'success');
                }).catch(() => {
                    // 备用方案：显示分享文本
                    prompt('复制以下内容进行分享：', shareText);
                });
            }
        }
        
        // 显示通知
        function showNotification(message, type = 'info') {
            // 创建通知元素
            const notification = document.createElement('div');
            notification.style.cssText = `
                position: fixed;
                top: 20px;
                right: 20px;
                padding: 15px 20px;
                background: ${type === 'success' ? 'rgba(40, 167, 69, 0.9)' : 'rgba(0, 123, 255, 0.9)'};
                color: white;
                border-radius: 8px;
                z-index: 1000;
                animation: slideIn 0.3s ease;
            `;
            notification.textContent = message;
            
            document.body.appendChild(notification);
            
            // 3秒后自动移除
            setTimeout(() => {
                notification.style.animation = 'slideOut 0.3s ease';
                setTimeout(() => {
                    if (notification.parentNode) {
                        notification.parentNode.removeChild(notification);
                    }
                }, 300);
            }, 3000);
        }
        
        // 添加动画样式
        const style = document.createElement('style');
        style.textContent = `
            @keyframes slideIn {
                from { transform: translateX(100%); opacity: 0; }
                to { transform: translateX(0); opacity: 1; }
            }
            @keyframes slideOut {
                from { transform: translateX(0); opacity: 1; }
                to { transform: translateX(100%); opacity: 0; }
            }
        `;
        document.head.appendChild(style);
    </script>
</body>
</html>
