<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>每日AI行业洞察·十大精选</title>
    <style>
        :root {
            --primary-color: #6366f1;
            --secondary-color: #8b5cf6;
            --background-color: #0f172a;
            --card-background: #1e293b;
            --text-primary: #f8fafc;
            --text-secondary: #cbd5e1;
            --border-color: #334155;
            --success-color: #10b981;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background-color: var(--background-color);
            color: var(--text-primary);
            line-height: 1.6;
            min-height: 100vh;
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
            padding: 2rem;
        }

        header {
            text-align: center;
            margin-bottom: 3rem;
            position: relative;
        }

        h1 {
            font-size: 2.5rem;
            font-weight: 700;
            background: linear-gradient(90deg, var(--primary-color), var(--secondary-color));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            margin-bottom: 1rem;
        }

        .refresh-btn-container {
            display: flex;
            justify-content: center;
            gap: 1rem;
            margin-top: 1.5rem;
        }

        .refresh-btn, .share-btn {
            display: flex;
            align-items: center;
            gap: 0.5rem;
            padding: 0.75rem 1.5rem;
            background: linear-gradient(135deg, var(--primary-color), var(--secondary-color));
            color: white;
            border: none;
            border-radius: 0.5rem;
            font-size: 1rem;
            font-weight: 500;
            cursor: pointer;
            transition: all 0.3s ease;
        }

        .refresh-btn:hover, .share-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 25px -5px rgba(99, 102, 241, 0.4);
        }

        .refresh-icon, .share-icon {
            width: 20px;
            height: 20px;
        }

        .news-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(350px, 1fr));
            gap: 1.5rem;
        }

        .news-card {
            background-color: var(--card-background);
            border-radius: 1rem;
            padding: 1.5rem;
            border: 1px solid var(--border-color);
            transition: all 0.3s ease;
            position: relative;
            overflow: hidden;
        }

        .news-card:hover {
            transform: translateY(-5px);
            border-color: var(--primary-color);
            box-shadow: 0 20px 25px -5px rgba(0, 0, 0, 0.1), 0 10px 10px -5px rgba(0, 0, 0, 0.04);
        }

        .news-card::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 4px;
            background: linear-gradient(90deg, var(--primary-color), var(--secondary-color));
        }

        .news-title {
            font-size: 1.1rem;
            font-weight: 600;
            margin-bottom: 1rem;
            color: var(--text-primary);
        }

        .news-content {
            font-size: 0.9rem;
            color: var(--text-secondary);
            margin-bottom: 1rem;
        }

        .news-meta {
            display: flex;
            justify-content: space-between;
            align-items: center;
            font-size: 0.8rem;
            color: var(--text-secondary);
            margin-bottom: 1rem;
        }

        .news-source {
            background-color: rgba(99, 102, 241, 0.1);
            color: var(--primary-color);
            padding: 0.25rem 0.75rem;
            border-radius: 1rem;
            font-size: 0.75rem;
            font-weight: 500;
        }

        .news-link {
            display: inline-block;
            color: var(--primary-color);
            text-decoration: none;
            font-size: 0.85rem;
            font-weight: 500;
            transition: color 0.3s ease;
        }

        .news-link:hover {
            color: var(--secondary-color);
            text-decoration: underline;
        }

        footer {
            text-align: center;
            margin-top: 3rem;
            padding-top: 2rem;
            border-top: 1px solid var(--border-color);
            color: var(--text-secondary);
            font-size: 0.9rem;
        }

        .loading {
            text-align: center;
            padding: 3rem;
            color: var(--text-secondary);
        }

        .toast {
            position: fixed;
            top: 20px;
            right: 20px;
            background-color: var(--success-color);
            color: white;
            padding: 1rem 1.5rem;
            border-radius: 0.5rem;
            box-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.1);
            transform: translateX(100%);
            transition: transform 0.3s ease;
            z-index: 1000;
        }

        .toast.show {
            transform: translateX(0);
        }

        @media (max-width: 768px) {
            .container {
                padding: 1rem;
            }

            h1 {
                font-size: 2rem;
            }

            .news-grid {
                grid-template-columns: 1fr;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <header>
            <h1>每日AI行业洞察·十大精选 · 2026年2月27日</h1>
            <div class="refresh-btn-container">
                <button id="refreshBtn" class="refresh-btn">
                    <svg class="refresh-icon" viewBox="0 0 24 24" fill="currentColor">
                        <path d="M17.65,6.35C16.2,4.9 14.21,4 12,4A8,8 0 0,0 4,12A8,8 0 0,0 12,20C15.73,20 18.84,17.45 19.73,14H17.65C16.83,16.33 14.61,18 12,18A6,6 0 0,1 6,12A6,6 0 0,1 12,6C13.66,6 15.14,6.69 16.22,7.78L13,11H20V4L17.65,6.35Z"></path>
                    </svg>
                    获取最新资讯
                </button>
                <button id="shareBtn" class="share-btn">
                    <svg class="share-icon" viewBox="0 0 24 24" fill="currentColor">
                        <path d="M18,16.08C17.24,16.08 16.56,16.38 16.04,16.85L8.91,12.7C8.96,12.47 9,12.24 9,12C9,11.76 8.96,11.53 8.91,11.3L15.96,7.19C16.5,7.69 17.21,8 18,8A3,3 0 0,0 21,5A3,3 0 0,0 18,2C15.65,2 13.73,3.66 13.35,5.93L7.39,9.34C6.54,9.76 6,10.56 6,11.5V16A2,2 0 0,0 8,18H13.5A2.5,2.5 0 0,0 16,15.5V11.22L18,12.3V16.08M15,13.5A1,1 0 0,1 14,14.5V17H9V15H13V14.5A1,1 0 0,1 15,13.5Z"></path>
                    </svg>
                    分享资讯
                </button>
            </div>
        </header>

        <div id="newsContainer" class="news-grid">
            <!-- 新闻卡片将通过JavaScript动态生成 -->
        </div>

        <footer>
            <p>最近更新：2026-02-27 18:00</p>
        </footer>
    </div>

    <div id="toast" class="toast">复制成功！</div>

    <script>
        // 新闻数据
        const newsData = [
            {

            {

                content: "DeepSeek V4 Lite代号'sealion-lite'正在积极测试，支持1M上下文窗口和原生多模态推理，非思考模式已超越V3.2。已向华为等国内芯片厂商提供V4提前访问权，推理成本仅为GPT-4的1/18，市场正准备迎接'DeepSeek时刻'。",

            },
            {
                id: 3,
                title: "OpenAI指控DeepSeek采用'蒸馏'技术",
                content: "OpenAI向美国国会众议院提交内部备忘录，指出DeepSeek采用'蒸馏'技术从美国前沿模型中抽取智能。引发中美AI技术竞争新争议，时间节点为2026年2月。",
                source: "OpenAI",
                time: "2026-02-27 12:00",
                link: "https://example.com/news3"
            },
            {
                id: 4,
                title: "A股AI算力板块关注度提升",
                content: "MSCI季度调整生效，有被动资金进场，AI算力、硬件板块关注度提升。沪指在4130-4170点区间震荡，北向资金预计净流入30-50亿元，两市成交额维持2.4-2.6万亿元。",
                source: "东方财富网",
                time: "2026-02-27 13:15",
                link: "https://example.com/news4"
            },
            {
                id: 5,
                title: "IDC预测2026年中国生成式AI搜索市场规模突破480亿元",
                content: "IDC最新数据显示，2026年中国生成式AI搜索市场规模将突破480亿元，年增长率高达68%。头部10%的GEO服务商贡献了全行业60%的显著优化案例，90%以上大型企业已部署专属AI大模型。",
                source: "IDC",
                time: "2026-02-27 14:00",
                link: "https://example.com/news5"
            },
            {

                source: "Gartner",
                time: "2026-02-27 14:30",
                link: "https://example.com/news6"
            },
            {
                id: 7,
                title: "存储芯片涨价潮来袭",
                content: "SK海力士称库存仅够维持4周，2026年存储芯片价格或持续上涨。中国长江存储等企业加速突围，存储芯片价格上涨将影响AI算力成本，产业链面临新一轮价格调整。",
                source: "行业资讯",

            },
            {
                id: 8,
                title: "用友网络AI业务成为增长新引擎",
                content: "用友网络持续推进AI技术应用与推广，AI至上、产品第一、交付革新。随着BIP产品竞争力持续显现、AI业务加速落地、海外业务积极拓展，AI成为用友业务复苏和增长的新动力。",
                source: "用友网络",

                link: "https://example.com/news8"
            },
            {
                id: 9,
                title: "AI编程从'感觉流'转向'工程智能'",
                content: "智谱AI推出的GLM-5模型标志着我们正式进入'工程智能'时代，AI开始具备独立规划、实施和迭代的完整工程能力。GLM-5能够自主进行项目规划，分解复杂任务，并在整个开发过程中持续优化和调整策略。",
                source: "智谱AI",
                time: "2026-02-27 16:00",
                link: "https://example.com/news9"
            },
            {
                id: 10,
                title: "2026年全球人工智能新局：企业如何把握增长机遇",
                content: "IDC数据显示，2026年全球智能算力规模将达到2022年的8-10倍，90%以上大型企业已部署专属AI大模型。技术落地效率与商业价值转化成为关键，AI产业进入关键分水岭。",
                source: "IDC",
                time: "2026-02-27 16:30",
                link: "https://example.com/news10"
            }
        ];

        // 渲染新闻卡片
        function renderNews(news) {
            const newsContainer = document.getElementById('newsContainer');
            newsContainer.innerHTML = '';

            news.forEach(item => {
                const card = document.createElement('div');
                card.className = 'news-card';
                card.innerHTML = `
                    <h3 class="news-title">${item.title}</h3>
                    <p class="news-content">${item.content}</p>
                    <div class="news-meta">
                        <span class="news-time">${item.time}</span>
                        <span class="news-source">${item.source}</span>
                    </div>
                    <a href="${item.link}" class="news-link" target="_blank">阅读原文</a>
                `;
                newsContainer.appendChild(card);
            });
        }

        // 显示提示消息
        function showToast(message) {
            const toast = document.getElementById('toast');
            toast.textContent = message;
            toast.classList.add('show');
            setTimeout(() => {
                toast.classList.remove('show');
            }, 3000);
        }

        // 分享功能
        function shareNews() {
            let shareContent = '';
            newsData.forEach((item, index) => {
                shareContent += `${index + 1}、${item.title}\n`;
            });
            shareContent += `\n更多详情请见 https://harker1544525153-lang.github.io/ai-insights/`;

            // 使用现代Clipboard API复制内容
            if (navigator.clipboard) {
                navigator.clipboard.writeText(shareContent)
                    .then(() => {
                        showToast('复制成功！');
                    })
                    .catch(err => {
                        console.error('复制失败:', err);
                        showToast('复制失败，请手动复制');
                    });
            } else {
                // 兼容旧浏览器
                const textArea = document.createElement('textarea');
                textArea.value = shareContent;
                document.body.appendChild(textArea);
                textArea.select();
                try {
                    document.execCommand('copy');
                    showToast('复制成功！');
                } catch (err) {
                    console.error('复制失败:', err);
                    showToast('复制失败，请手动复制');
                }
                document.body.removeChild(textArea);
            }
        }

        // 初始化页面
        document.addEventListener('DOMContentLoaded', function() {
            renderNews(newsData);

            // 绑定分享按钮事件
            document.getElementById('shareBtn').addEventListener('click', shareNews);

            // 绑定刷新按钮事件
            document.getElementById('refreshBtn').addEventListener('click', function() {
                // 模拟刷新效果
                const newsContainer = document.getElementById('newsContainer');
                newsContainer.innerHTML = '<div class="loading">刷新中...</div>';
                setTimeout(() => {
                    renderNews(newsData);
                }, 1000);
            });
        });
    </script>
</body>
</html>
